# End-to-end sync tests. Boots a Craft 5 test app via craftcms/test-framework,
# which sets up a transactional test DB and a seeded project config. Each test
# runs inside a DB transaction that's rolled back at teardown.
#
# Requires:
#   - A test DB (see tests/_craft/config/db.php — reads from tests/.env).
#   - tests/_craft/config/project/ seeded with a section, an entry type, and
#     the field set the tests exercise (Assets, Lightswitch, Dropdown, Entries,
#     PlainText). See tests/_craft/config/project/README.md.
#
# Don't add the Yii Db module here — craftcms/test-framework wraps that itself.
actor: FeatureTester
modules:
    enabled:
        - Asserts
        - craft\test\Craft:
            configFile: 'tests/_craft/codeception.php'
            entryUrl: 'https://test.craftcms.test/index.php'
            entryScript: 'index.php'
            projectConfig:
                folder: 'tests/_craft/config/project/'
                reset: true
            migrations: []
            plugins:
                - { class: TDM\Influx\Influx, handle: 'influx' }
            setupDb:
                clean: true
                setupCraft: true
            fullMock: false
